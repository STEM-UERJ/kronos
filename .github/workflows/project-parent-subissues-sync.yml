name: Sync Project Parent and Sub-issues

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: read
  issues: read
  repository-projects: write

jobs:
  sync-status:
    runs-on: ubuntu-latest
    steps:
      - name: Sync planning parent issues with sub-issues
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.PROJECT_AUTOMATION_TOKEN || github.token }}
          script: |
            const org = "STEM-UERJ";
            const repoOwner = "STEM-UERJ";
            const repoName = "kronos";
            const projectNumber = 3;

            // Parent planning cards controlled by this automation.
            const parentIssueNumbers = [22, 23, 24, 25];

            const normalize = (v) => (v || "").trim().toLowerCase();

            let projectData;
            try {
              projectData = await github.graphql(
                `query($org: String!, $number: Int!) {
                  organization(login: $org) {
                    projectV2(number: $number) {
                      id
                      fields(first: 100) {
                        nodes {
                          __typename
                          ... on ProjectV2SingleSelectField {
                            id
                            name
                            options {
                              id
                              name
                            }
                          }
                        }
                      }
                    }
                  }
                }`,
                { org, number: projectNumber }
              );
            } catch (error) {
              core.setFailed(
                "Cannot access organization project. Set secret PROJECT_AUTOMATION_TOKEN with access to org projects, then rerun workflow."
              );
              return;
            }

            const project = projectData.organization?.projectV2;
            if (!project) {
              core.setFailed("Project not found.");
              return;
            }

            const statusField = project.fields.nodes.find(
              (f) => f.__typename === "ProjectV2SingleSelectField" && normalize(f.name) === "status"
            );

            if (!statusField) {
              core.setFailed("Status field not found in project.");
              return;
            }

            const findOptionId = (names) => {
              const normalizedNames = names.map(normalize);
              const option = statusField.options.find((o) => normalizedNames.includes(normalize(o.name)));
              return option?.id;
            };

            const inProgressOptionId = findOptionId(["In Progress", "In progress"]);
            const doneOptionId = findOptionId(["Done"]);

            if (!inProgressOptionId || !doneOptionId) {
              core.setFailed("Could not find required status options: In Progress and Done.");
              return;
            }

            const itemsByIssueNumber = new Map();
            let cursor = null;
            let hasNextPage = true;

            while (hasNextPage) {
              const itemsData = await github.graphql(
                `query($org: String!, $number: Int!, $after: String) {
                  organization(login: $org) {
                    projectV2(number: $number) {
                      items(first: 100, after: $after) {
                        nodes {
                          id
                          content {
                            __typename
                            ... on Issue {
                              id
                              number
                              repository {
                                name
                                owner {
                                  login
                                }
                              }
                            }
                          }
                          fieldValueByName(name: "Status") {
                            __typename
                            ... on ProjectV2ItemFieldSingleSelectValue {
                              optionId
                              name
                            }
                          }
                        }
                        pageInfo {
                          hasNextPage
                          endCursor
                        }
                      }
                    }
                  }
                }`,
                { org, number: projectNumber, after: cursor }
              );

              const items = itemsData.organization.projectV2.items;
              for (const item of items.nodes) {
                if (item.content?.__typename !== "Issue") continue;
                const issue = item.content;
                const sameRepo =
                  normalize(issue.repository.owner.login) === normalize(repoOwner) &&
                  normalize(issue.repository.name) === normalize(repoName);
                if (!sameRepo) continue;

                itemsByIssueNumber.set(issue.number, {
                  projectItemId: item.id,
                  statusName: item.fieldValueByName?.name || null,
                  statusOptionId: item.fieldValueByName?.optionId || null,
                });
              }

              hasNextPage = items.pageInfo.hasNextPage;
              cursor = items.pageInfo.endCursor;
            }

            const setStatus = async (projectItemId, optionId) => {
              await github.graphql(
                `mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                  updateProjectV2ItemFieldValue(
                    input: {
                      projectId: $projectId
                      itemId: $itemId
                      fieldId: $fieldId
                      value: { singleSelectOptionId: $optionId }
                    }
                  ) {
                    projectV2Item {
                      id
                    }
                  }
                }`,
                {
                  projectId: project.id,
                  itemId: projectItemId,
                  fieldId: statusField.id,
                  optionId,
                }
              );
            };

            for (const parentIssueNumber of parentIssueNumbers) {
              const parentIssueData = await github.graphql(
                `query($owner: String!, $repo: String!, $number: Int!) {
                  repository(owner: $owner, name: $repo) {
                    issue(number: $number) {
                      number
                      title
                      subIssues(first: 100) {
                        nodes {
                          number
                          title
                        }
                      }
                    }
                  }
                }`,
                { owner: repoOwner, repo: repoName, number: parentIssueNumber }
              );

              const parentIssue = parentIssueData.repository?.issue;
              if (!parentIssue) {
                core.warning(`Parent issue #${parentIssueNumber} not found.`);
                continue;
              }

              const parentItem = itemsByIssueNumber.get(parentIssueNumber);
              if (!parentItem) {
                core.warning(`Parent issue #${parentIssueNumber} is not in project #${projectNumber}.`);
                continue;
              }

              const subIssueNumbers = (parentIssue.subIssues?.nodes || []).map((s) => s.number);
              if (subIssueNumbers.length === 0) {
                core.info(`Parent #${parentIssueNumber} has no sub-issues. Skipping.`);
                continue;
              }

              const parentIsInProgress = parentItem.statusOptionId === inProgressOptionId;

              if (parentIsInProgress) {
                for (const subNumber of subIssueNumbers) {
                  const subItem = itemsByIssueNumber.get(subNumber);
                  if (!subItem) {
                    core.warning(`Sub-issue #${subNumber} is not in the project.`);
                    continue;
                  }

                  // Do not regress items that are already Done.
                  if (subItem.statusOptionId === doneOptionId) continue;

                  if (subItem.statusOptionId !== inProgressOptionId) {
                    await setStatus(subItem.projectItemId, inProgressOptionId);
                    core.info(`Set sub-issue #${subNumber} to In Progress (parent #${parentIssueNumber} in progress).`);
                    subItem.statusOptionId = inProgressOptionId;
                    subItem.statusName = "In Progress";
                  }
                }
              }

              const allSubIssuesDone = subIssueNumbers.every((subNumber) => {
                const subItem = itemsByIssueNumber.get(subNumber);
                return subItem?.statusOptionId === doneOptionId;
              });

              if (allSubIssuesDone && parentItem.statusOptionId !== doneOptionId) {
                await setStatus(parentItem.projectItemId, doneOptionId);
                core.info(`Set parent issue #${parentIssueNumber} to Done (all sub-issues done).`);
              }
            }

            core.info("Project parent/sub-issues sync completed.");